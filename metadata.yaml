# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: sailpoint-identity-now-disable-account
description: Disable an account in SailPoint IdentityNow

# Input parameters for web form generation
inputs:
  accountId:
    type: text
    description: The ID of the account to disable
    required: true
    validation:
      min: 1
      max: 255

  address:
    type: text
    description: Optional SailPoint IdentityNow API base URL override
    required: false
    validation:
      min: 1
      max: 100

  externalVerificationId:
    type: text
    description: External verification ID for the disable operation
    required: false
    validation:
      max: 255

  forceProvisioning:
    type: boolean
    description: Force provisioning of the account disable operation
    required: false

# Expected output structure
outputs:
  accountId:
    type: text
    description: The ID of the account that was disabled

  disabled:
    type: boolean
    description: Whether the account was successfully disabled

  taskId:
    type: text
    description: The ID of the provisioning task created

  message:
    type: text
    description: Additional information about the operation

  disabledAt:
    type: datetime
    description: When the account was disabled (ISO 8601)

  address:
    type: text
    description: The SailPoint IdentityNow API base URL used

environment:
  ADDRESS:
    type: text
    description: Base URL for the API
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false

secrets:
  BEARER_AUTH_TOKEN:
    type: text
    description: Bearer auth token
    required: false
  BASIC_USERNAME:
    type: text
    description: Basic auth username
    required: false
  BASIC_PASSWORD:
    type: text
    description: Basic auth password
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret
    required: false
  OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN:
    type: text
    description: OAuth2 authorization code access token
    required: false

optional_one_of:
  - ["secrets.BEARER_AUTH_TOKEN"]
  - ["secrets.BASIC_USERNAME", "secrets.BASIC_PASSWORD"]
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
    ]
  - ["secrets.OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN"]
